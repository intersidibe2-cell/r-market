<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="50%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect x="10" y="10" width="492" height="492" rx="100" ry="100" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="430" cy="100" r="45" fill="rgba(255,255,255,0.08)"/>
  <circle cx="450" cy="400" r="70" fill="rgba(255,255,255,0.06)"/>
  <circle cx="60" cy="420" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="256" cy="60" r="35" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Main RM text -->
  <text x="256" y="280" 
        font-family="Arial Black, Arial, sans-serif" 
        font-size="180" 
        font-weight="900" 
        fill="url(#textGradient)" 
        text-anchor="middle" 
        dominant-baseline="middle"
        letter-spacing="-10">RM</text>
  
  <!-- Shopping cart icon inside M -->
  <g transform="translate(300, 180) scale(0.8)">
    <path d="M10 10 L15 10 L25 45 L55 45 L60 20 L20 20" 
          stroke="#22c55e" 
          stroke-width="5" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    <circle cx="28" cy="55" r="5" fill="#22c55e"/>
    <circle cx="50" cy="55" r="5" fill="#22c55e"/>
  </g>
  
  <!-- R-Market text -->
  <text x="256" y="400" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="700" 
        fill="#ffffff" 
        text-anchor="middle"
        letter-spacing="4">R-MARKET</text>
  
  <!-- Tagline -->
  <text x="256" y="450" 
        font-family="Arial, sans-serif" 
        font-size="22" 
        fill="rgba(255,255,255,0.85)" 
        text-anchor="middle"
        letter-spacing="2">MARKETPLACE MALI</text>
</svg>
